[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200


board_build.arduino.earlephilhower.usb_vid = 0x16C0 ; openJII screen for it, bvb 0x0001 return "Could not connect"
board_build.arduino.earlephilhower.usb_pid = 0x0483 ; openJII screen for it
board_build.arduino.earlephilhower.usb_manufacturer = Espressif 
board_build.arduino.earlephilhower.usb_product = USB Serial



lib_deps = 
  https://github.com/boschsensortec/Bosch-BME68x-Library.git
  https://github.com/adafruit/Adafruit_AS7341.git
  https://github.com/bblanchon/ArduinoJson.git